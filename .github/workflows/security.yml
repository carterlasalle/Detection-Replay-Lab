name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "47 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
          enable-cache: true
      - name: Export locked dependency graph
        run: uv export --locked --all-extras --no-emit-project --output-file requirements-audit.txt
      - name: Audit dependencies
        run: uvx pip-audit --requirement requirements-audit.txt
      - name: Validate all public lab content
        run: |
          uv sync --locked
          uv run drl validate --rules rules --scenarios scenarios/credential_access scenarios/defense_evasion

  dependency-review:
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/dependency-review-action@v5

